name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing GitHub Release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
            asset_name: apim-policy-compiler-linux-x64
            executable_name: apim-policy-compiler
            archive_name: apim-policy-compiler-linux-x64.tar.gz
          - rid: osx-arm64
            runner: macos-15
            asset_name: apim-policy-compiler-osx-arm64
            executable_name: apim-policy-compiler
            archive_name: apim-policy-compiler-osx-arm64.tar.gz
          - rid: win-x64
            runner: windows-2025
            asset_name: apim-policy-compiler-win-x64
            executable_name: apim-policy-compiler.exe
            archive_name: apim-policy-compiler-win-x64.zip

    env:
      PROJECT: src/ApimPolicyCompiler.Cli/ApimPolicyCompiler.Cli.csproj
      OUTPUT_DIR: artifacts/${{ matrix.rid }}
      RELEASE_TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore "$env:PROJECT" -r "${{ matrix.rid }}" -p:PublishAot=true -v minimal
        shell: pwsh

      - name: Test
        run: dotnet test tests/ApimPolicyCompiler.Tests/ApimPolicyCompiler.Tests.csproj --no-restore -v minimal

      - name: Publish Native AOT
        run: >
          dotnet publish "$env:PROJECT"
          -c Release
          -r "${{ matrix.rid }}"
          -p:PublishAot=true
          --self-contained true
          --no-restore
          -o "$env:OUTPUT_DIR"
          -v minimal
        shell: pwsh

      - name: Normalize binary name
        run: |
          Get-ChildItem -Force $env:OUTPUT_DIR
          $expectedPath = Join-Path $env:OUTPUT_DIR '${{ matrix.executable_name }}'
          $binary = Get-ChildItem -Path $env:OUTPUT_DIR -File |
            Where-Object {
              $_.Name -notlike '*.dll' `
                -and $_.Name -notlike '*.pdb' `
                -and $_.Name -notlike '*.json' `
                -and $_.Name -notlike '*.dbg' `
                -and $_.Name -notlike '*.so' `
                -and $_.Name -notlike '*.dylib'
            } |
            Select-Object -First 1
          if ($null -eq $binary) {
            throw "No native executable found in $env:OUTPUT_DIR"
          }
          $expectedFullPath = [System.IO.Path]::GetFullPath($expectedPath)
          $binaryFullPath = [System.IO.Path]::GetFullPath($binary.FullName)
          if ($binaryFullPath -ne $expectedFullPath) {
            Copy-Item $binary.FullName $expectedPath -Force
          }
          if ($IsLinux -or $IsMacOS) {
            chmod +x $expectedPath
            file $expectedPath
          }
          if ($IsLinux) {
            ldd $expectedPath || true
          }
        shell: pwsh

      - name: Smoke test binary
        run: |
          & (Join-Path $env:OUTPUT_DIR '${{ matrix.executable_name }}') rate-limit `
            --input tests/ApimPolicyCompiler.Tests/Fixtures/valid/disabled-config.json `
            --stdout
        shell: pwsh

      - name: Package Unix release asset
        if: runner.os != 'Windows'
        run: tar -C "$OUTPUT_DIR" -czf "${{ matrix.archive_name }}" "${{ matrix.executable_name }}"

      - name: Package Windows release asset
        if: runner.os == 'Windows'
        run: Compress-Archive -Path (Join-Path $env:OUTPUT_DIR '${{ matrix.executable_name }}') -DestinationPath '${{ matrix.archive_name }}' -Force
        shell: pwsh

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:RELEASE_TAG_NAME" "${{ matrix.archive_name }}" --clobber
        shell: pwsh
