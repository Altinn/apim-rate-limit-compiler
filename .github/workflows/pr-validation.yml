name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore ApimRateLimitCompiler.slnx -v minimal

      - name: Build
        run: dotnet build ApimRateLimitCompiler.slnx --no-restore -v minimal

      - name: Test
        run: dotnet test tests/ApimRateLimitCompiler.Tests/ApimRateLimitCompiler.Tests.csproj --no-build -v minimal
